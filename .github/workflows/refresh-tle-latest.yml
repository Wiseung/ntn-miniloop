name: Refresh TLE Latest

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional snapshot tag (defaults to current UTC date)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve snapshot tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Preserve previous manifest
        shell: bash
        run: |
          if [ -f data/tle/snapshots/latest_snapshot.json ]; then
            cp data/tle/snapshots/latest_snapshot.json data/tle/snapshots/latest_snapshot.before.json
          else
            echo '{}' > data/tle/snapshots/latest_snapshot.before.json
          fi

      - name: Refresh latest aliases
        run: python tools/fetch_tle_snapshots.py --tag "${{ steps.tag.outputs.value }}"

      - name: Validate fetch quality
        id: quality
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("data/tle/snapshots/latest_snapshot.json").read_text(encoding="utf-8"))
          sources = manifest.get("sources", {})
          failures = [name for name, info in sources.items() if not info.get("fetch_ok", False)]
          all_failed = bool(sources) and len(failures) == len(sources)
          labels = []
          if failures:
              labels.append("tle-fetch-warning")
          error_lines = []
          for name in failures:
              info = sources[name]
              error_lines.append(
                  f"- `{name}`: status=`{info.get('fetch_status')}` error=`{info.get('fetch_error')}`"
              )
          with open(Path.cwd() / "quality_outputs.txt", "w", encoding="utf-8") as handle:
              handle.write(f"all_failed={'true' if all_failed else 'false'}\n")
              handle.write(f"pr_labels={','.join(labels)}\n")
              handle.write(f"failed_sources={','.join(failures)}\n")
          Path("failure_comment.md").write_text(
              "## TLE Fetch Warning\n\n"
              + "One or more sources failed to refresh cleanly in this run.\n\n"
              + ("\n".join(error_lines) if error_lines else "No failed sources.\n"),
              encoding="utf-8",
          )
          if all_failed:
              raise SystemExit(f"All TLE sources failed to refresh: {', '.join(failures)}")
          PY
          while IFS='=' read -r key value; do
            echo "${key}=${value}" >> "$GITHUB_OUTPUT"
          done < quality_outputs.txt

      - name: Detect snapshot changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet --exit-code -- data/tle/snapshots; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Snapshot changes detected."
          fi

      - name: Build PR body
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("data/tle/snapshots/latest_snapshot.json").read_text(encoding="utf-8"))
          previous = json.loads(Path("data/tle/snapshots/latest_snapshot.before.json").read_text(encoding="utf-8"))

          def previous_object_count(source_name):
              try:
                  return previous["sources"][source_name]["object_count"]
              except Exception:
                  return None

          def delta_str(current, previous_value):
              if previous_value is None:
                  return "n/a"
              delta = current - previous_value
              return f"{delta:+d}"

          def delta_pct_str(current, previous_value):
              if previous_value in (None, 0):
                  return "n/a"
              delta_pct = (current - previous_value) / previous_value * 100.0
              return f"{delta_pct:+.2f}%"

          lines = [
              "Refreshes latest TLE aliases and snapshot manifest.",
              "",
              f"- snapshot tag: `{manifest['tag']}`",
              f"- generated at: `{manifest['generated_at_utc']}`",
              "",
              "## Source Summary",
              "",
              "| Source | Objects | Delta vs previous | Lines | Fetch OK | Status |",
              "| --- | ---: | ---: | ---: | --- | --- |",
          ]
          for source_name, source_info in manifest["sources"].items():
              lines.append(
                  "| {name} | {objects} | {delta} | {lines_count} | {fetch_ok} | {status} |".format(
                      name=source_name,
                      objects=source_info["object_count"],
                      delta=delta_str(source_info["object_count"], previous_object_count(source_name)),
                      lines_count=source_info["line_count"],
                      fetch_ok=str(source_info["fetch_ok"]).lower(),
                      status=source_info["fetch_status"],
                  )
              )
          failed_sources = [name for name, info in manifest["sources"].items() if not info.get("fetch_ok", False)]
          if failed_sources:
              lines.extend(
                  [
                      "",
                      "## Fetch Warnings",
                      "",
                      "- failed sources: `{}`".format(", ".join(failed_sources)),
                  ]
              )
          lines.extend(
              [
                  "",
                  "## Combined",
                  "",
                  "- objects: `{}`".format(manifest["combined"]["object_count"]),
                  "- delta vs previous: `{}`".format(
                      delta_str(
                          manifest["combined"]["object_count"],
                          previous.get("combined", {}).get("object_count"),
                      )
                  ),
                  "- delta vs previous (%): `{}`".format(
                      delta_pct_str(
                          manifest["combined"]["object_count"],
                          previous.get("combined", {}).get("object_count"),
                      )
                  ),
                  "- lines: `{}`".format(manifest["combined"]["line_count"]),
                  "",
                  "## Changed Files",
                  "",
                  "- updates `*_latest.tle` aliases",
                  "- updates `latest_snapshot.json`",
                  "- stores dated snapshot files for the current tag",
              ]
          )
          Path("pr_body.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Create Pull Request
        id: cpr
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/refresh-tle-latest
          delete-branch: true
          title: "chore: refresh TLE latest snapshots"
          commit-message: "chore: refresh TLE latest snapshots"
          body-path: pr_body.md
          labels: ${{ steps.quality.outputs.pr_labels }}
          add-paths: |
            data/tle/snapshots/*.tle
            data/tle/snapshots/latest_snapshot.json

      - name: Comment detailed fetch warnings
        if: steps.changes.outputs.has_changes == 'true' && steps.quality.outputs.failed_sources != '' && steps.cpr.outputs.pull-request-number != ''
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('failure_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.cpr.outputs.pull-request-number }}'),
              body,
            });
